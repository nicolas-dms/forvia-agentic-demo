# =============================================================================
# agent.yaml — Manifeste déclaratif de l'agent (artefact VERSIONNÉ dans Git)
#
# C'est LE fichier au coeur de la démo CI/CD : il décrit l'agent de façon
# portable (nom, modèle, instructions, outils, protocole). Chaque modification
# committée = une nouvelle version reproductible.
#
# En pratique, laissez le Foundry Toolkit / `azd ai agent init` générer et
# valider ce fichier (le schéma « hosted » peut évoluer). Cet exemple montre
# la forme et les champs les plus courants.
# =============================================================================

kind: hosted                      # agent hébergé (conteneur géré par Foundry)
name: weather-concierge
description: >-
  Assistant météo de démonstration. Répond aux questions de prévisions
  de manière concise et amicale.

# Modèle cible — le nom doit correspondre à un déploiement existant dans le
# projet Foundry de test (variable AZURE_AI_MODEL_DEPLOYMENT_NAME du pipeline).
model:
  name: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  options:
    temperature: 0.4
    topP: 0.95

# Instructions système — la ligne que l'on modifie pendant la démo live pour
# déclencher une nouvelle version.
instructions: >-
  Tu es « Weather Concierge », un assistant météo.
  Réponds de façon brève et claire. Si l'utilisateur ne précise pas de ville,
  demande-la poliment.

# Protocole d'invocation exposé par l'agent hébergé.
protocols:
  - protocol: responses
    version: "1"

# Ressources conteneur (dimensionnement minimal pour une démo).
resources:
  cpu: "0.5"
  memory: 1Gi

# Variables d'environnement injectées au runtime (résolues par le pipeline).
environment_variables:
  - name: FOUNDRY_PROJECT_ENDPOINT
    value: ${FOUNDRY_PROJECT_ENDPOINT}

# Outils optionnels (décommentez pour enrichir l'agent) :
# tools:
#   - type: web_search
#   - type: code_interpreter
